<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sign-In</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: transparent;
      }
      .card {
        width: min(360px, calc(100vw - 32px));
        border-radius: 18px;
        padding: 16px;
        background: rgba(20, 20, 20, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(12px);
        color: #fff;
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        opacity: 0.86;
        font-size: 0.92rem;
        line-height: 1.35;
      }
      .row {
        display: grid;
        gap: 10px;
      }
      .btn {
        height: 42px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.25);
        color: #fff;
        cursor: pointer;
      }
      .btn:hover {
        filter: brightness(1.06);
      }
      .error {
        color: #ffb4ab;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="card" role="dialog" aria-label="Continuar con Google">
      <div class="row">
        <h1>Continuar con Google</h1>
        <p>Se abrirá el selector de cuenta para continuar.</p>
      </div>

      <div id="g-btn"></div>
      <div id="error" class="error" hidden></div>

      <button id="cancel" class="btn" type="button">Cancelar</button>
    </div>

    <script>
      function parseHash() {
        const raw = String(location.hash || "").replace(/^#/, "");
        const params = new URLSearchParams(raw);
        return Object.fromEntries(params.entries());
      }

      const params = parseHash();
      const clientId = params.client_id;
      const parentOrigin = params.parent_origin || window.location.origin;

      const errorEl = document.getElementById("error");
      function showError(message) {
        errorEl.textContent = message;
        errorEl.hidden = false;
      }

      document.getElementById("cancel").addEventListener("click", () => {
        window.parent.postMessage({ type: "google-cancel" }, parentOrigin);
      });

      if (!clientId) {
        showError("Falta configurar el client_id de Google.");
      } else {
        const script = document.createElement("script");
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.defer = true;
        script.onload = () => {
          if (!window.google || !google.accounts || !google.accounts.id) {
            showError("No se pudo cargar Google Sign-In.");
            return;
          }

          google.accounts.id.initialize({
            client_id: clientId,
            callback: (response) => {
              window.parent.postMessage(
                { type: "google-credential", credential: response.credential },
                parentOrigin
              );
            }
          });

          google.accounts.id.renderButton(document.getElementById("g-btn"), {
            theme: "outline",
            size: "large",
            shape: "pill",
            width: 320,
            text: "continue_with"
          });

          google.accounts.id.prompt();
        };
        script.onerror = () => showError("No se pudo cargar el script de Google.");
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
